name: Android Build Pipeline

on:
  push:
    branches: [ "main", "master", "develop" ]
  pull_request:
    branches: [ "main", "master", "develop" ]
  workflow_dispatch: # Allows manual triggers from GitHub UI

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout Repository
      uses: actions/checkout@v4

    - name: Set up JDK 21
      uses: actions/setup-java@v4
      with:
        distribution: 'temurin'
        java-version: '21'

    - name: Set up Gradle Action caching
      uses: gradle/actions/setup-gradle@v4

    - name: Cache Robolectric Jar Files
      uses: actions/cache@v4
      with:
        path: ~/.cache/robolectric
        key: ${{ runner.os }}-robolectric-${{ hashFiles('**/*.gradle*', '**/gradle-wrapper.properties') }}
        restore-keys: |
          ${{ runner.os }}-robolectric-

    - name: Set up Environment Config
      run: |
        if [ -f .env.example ]; then
          cp .env.example .env
        else
          touch .env
        fi

    - name: Download Clean Gradle Wrapper
      run: |
        rm -f gradle/wrapper/gradle-wrapper.jar
        curl -sSL -o gradle/wrapper/gradle-wrapper.jar https://github.com/gradle/gradle/raw/v9.3.1/gradle/wrapper/gradle-wrapper.jar

    - name: Decode or Generate Debug Keystore
      run: |
        if [ -f debug.keystore.base64 ]; then
          echo "Decoding debug.keystore.base64..."
          base64 -d debug.keystore.base64 > debug.keystore
        else
          echo "debug.keystore.base64 not found. Generating a new debug.keystore dynamically..."
          keytool -genkey -v \
            -keystore debug.keystore \
            -storepass android \
            -alias androiddebugkey \
            -keypass android \
            -keyalg RSA \
            -keysize 2048 \
            -validity 10000 \
            -dname "CN=Android Debug,O=Android,C=US"
        fi

    - name: Grant Execute Permission to Gradlew
      run: chmod +x gradlew

    - name: Build Debug APK
      run: ./gradlew assembleDebug
      timeout-minutes: 15

    - name: Locate and Upload Debug APK
      uses: actions/upload-artifact@v4
      with:
        name: app-lock-debug-apk
        path: app/build/outputs/apk/debug/app-debug.apk
        if-no-files-found: error
        retention-days: 7

    - name: Run Unit & Robolectric Tests
      run: ./gradlew testDebugUnitTest --continue
      timeout-minutes: 10
      continue-on-error: true
