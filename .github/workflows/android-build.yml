name: Android Build Pipeline

on:
  push:
    branches: [ "main", "master", "develop" ]
  pull_request:
    branches: [ "main", "master", "develop" ]
  workflow_dispatch: # Allows manual triggers from GitHub UI

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout Repository
      uses: actions/checkout@v4

    - name: Set up JDK 21
      uses: actions/setup-java@v4
      with:
        distribution: 'temurin'
        java-version: '21'
        cache: 'gradle'

    - name: Set up Environment Config
      run: |
        if [ -f .env.example ]; then
          cp .env.example .env
        else
          touch .env
        fi

    - name: Download Clean Gradle Wrapper
      run: |
        rm -f gradle/wrapper/gradle-wrapper.jar
        curl -sSL -o gradle/wrapper/gradle-wrapper.jar https://github.com/gradle/gradle/raw/v9.3.1/gradle/wrapper/gradle-wrapper.jar

    - name: Grant Execute Permission to Gradlew
      run: chmod +x gradlew

    - name: Build Debug APK
      run: ./gradlew assembleDebug

    - name: Locate and Upload Debug APK
      uses: actions/upload-artifact@v4
      with:
        name: app-lock-debug-apk
        path: app/build/outputs/apk/debug/app-debug.apk
        if-no-files-found: error
        retention-days: 7

    - name: Run Unit & Robolectric Tests
      run: ./gradlew testDebugUnitTest --continue
      continue-on-error: true
